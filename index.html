<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Playlist Forjadas no Lugar Secreto</title>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="overlay"></div>

    <main class="app">

        <header>

            <h1>
                Playlist<br>
                <span>Forjadas no Lugar Secreto</span>
            </h1>

            <p class="subtitle">
                Ouça com o coração e permita que cada canção conduza você ao Lugar Secreto.
            </p>

        </header>

        <section id="playlist" class="playlist"></section>

        <section class="player-area">

            <div id="youtube-player"></div>

        </section>

    </main>

    <!-- API do YouTube -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <!-- Script da playlist -->
    <script src="script.js"></script>

</body>

</html>
